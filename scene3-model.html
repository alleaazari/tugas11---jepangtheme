<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scene 3 – Model 3D Kuil Jepang</title>
  <script src="js/aframe.min.js"></script>
  <script src="js/components.js"></script>
</head>
<body>
  <a-scene renderer="shadowMapEnabled: true">
    <a-assets timeout="5000">
      <a-asset-item id="model3d" src="assets/pagoda.glb"></a-asset-item>
    </a-assets>

    <a-sky color="#0D0D2A"></a-sky>
    <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#2C1A0E" shadow="receive: true"></a-plane>

    <a-light type="ambient" color="#FFF5E0" intensity="0.8"></a-light>
    <a-light type="directional" position="2 4 3" color="#FFEECC" intensity="1" cast-shadow="true"></a-light>

    <a-camera position="0 1.6 4" wasd-controls="fly: false; acceleration: 30">
      <a-cursor fuse="true" fuse-timeout="1500" color="#E83929" raycaster="objects: .clickable"></a-cursor>
    </a-camera>

    <a-entity position="0 0 -3">
      <a-entity
        id="mainModel"
        gltf-model="#model3d"
        scale="15 15 15"
        class="clickable"
        shadow="cast: true"
        animation__idle="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
        animation__click="property: scale; to: 22 22 22; startEvents: click; dur: 300; dir: alternate; loop: 2">
      </a-entity>
      
<a-text 
  value="PAGODA JEPANG" 
  position="-6 2 -2" 
  align="center" 
  color="white" 
  width="12">
</a-text>
    </a-entity>

    <a-link href="scene2.html" title="Kembali Panorama" position="-2 1.5 0" class="clickable"></a-link>
    <a-link href="index.html" title="Kembali Scene 1" position="2 1.5 0" class="clickable"></a-link>
  </a-scene>
</body>
</html>
