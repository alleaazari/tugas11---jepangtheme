<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scene 1 – Kuil Jepang</title>
  <script src="js/aframe.min.js"></script>
  <script src="js/aframe-environment-component.min.js"></script>
  <script src="js/components.js"></script>
</head>
<body>
  <a-scene>
    <a-entity environment="preset: japan; ground: flat; fog: 0.6"></a-entity>

    <a-camera position="0 1.6 5" wasd-controls="fly: false; acceleration: 30">
      <a-cursor fuse="true" 
                fuse-timeout="1500" 
                color="#E83929" 
                raycaster="objects: .clickable; showLine: true">
      </a-cursor>
    </a-camera>

    <a-text value="Kuil Jepang - Scene 1" position="0 4.5 -4" align="center" color="#FFFFFF" width="8"></a-text>

    <a-box position="-3.5 1 -3" color="#E83929" class="clickable"
           animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"></a-box>

    <a-sphere position="-1.2 1.2 -3" radius="0.5" color="#F5CBA7" class="clickable"
              animation="property: position; to: -1.2 2.2 -3; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine"></a-sphere>

    <a-cylinder position="1.2 1 -3" radius="0.4" height="1.5" color="#884EA0" class="clickable"
                blink="interval: 800"
                animation__click="property: rotation; to: 0 360 0; startEvents: click; dur: 1000; easing: easeOutElastic"></a-cylinder>

    <a-cone position="3.5 1 -3" radius-bottom="0.5" height="1.5" color="#E83929" class="clickable"
            cone-click-color
            animation="property: rotation; to: 0 360 0; loop: true; dur: 2500; easing: linear"></a-cone>

    <a-link href="scene2.html" title="Panorama 360" position="-2 1.5 -5" class="clickable"></a-link>
    <a-link href="scene4-gallery.html" title="Galeri 3D" position="2 1.5 -5" class="clickable"></a-link>
  </a-scene>
</body>
</html>
