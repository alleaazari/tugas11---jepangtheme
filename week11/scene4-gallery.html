<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scene 4 – Galeri 3D</title>
  <script src="js/aframe.min.js"></script>
  <script src="js/components.js"></script>
</head>
<body>
  <a-scene renderer="shadowMapEnabled: true">
    <a-assets timeout="10000">
      <a-asset-item id="model-torii" src="assets/model.glb"></a-asset-item>
      <a-asset-item id="model-koi" src="assets/kolam_koi.glb"></a-asset-item>
      <a-asset-item id="model-pagoda" src="assets/pagoda.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" color="#FFFFFF" intensity="1.2"></a-light>
    <a-light type="directional" color="#FFFFFF" intensity="1.5" position="-1 3 1" cast-shadow="true"></a-light>

    <a-camera position="0 1.6 0" wasd-controls="fly: false; acceleration: 30">
      <a-cursor fuse="true" fuse-timeout="1500" color="#E83929" raycaster="objects: .clickable"></a-cursor>
    </a-camera>

    <a-sky color="#0D0D2A"></a-sky>

    <a-plane position="0 -0.1 0" rotation="-90 0 0" width="40" height="40" color="#2C1A0E" shadow="receive: true"></a-plane>

    <a-entity position="-4 0 -5">
      <a-entity gltf-model="#model-torii" scale="0.08 0.08 0.08" class="clickable" shadow="cast: true"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
      </a-entity>
      <a-text value="Gerbang Torii" position="0 3.5 0" align="center" color="#FFFFFF" look-at-camera></a-text>
    </a-entity>

    <a-entity position="0 0 -5">
      <a-entity gltf-model="#model-koi" scale="0.5 0.5 0.5" class="clickable" shadow="cast: true">
      </a-entity>
      <a-text value="Kolam Koi" position="0 2 0" align="center" color="#FFFFFF" look-at-camera></a-text>
    </a-entity>

    <a-entity position="4 0 -5">
      <a-entity gltf-model="#model-pagoda" scale="10 10 10" class="clickable" shadow="cast: true"
                animation="property: rotation; to: 0 -360 0; loop: true; dur: 12000; easing: linear">
      </a-entity>
      <a-text value="Pagoda Suci" position="0 2.5 0" align="center" color="#FFFFFF" look-at-camera></a-text>
    </a-entity>

    <a-link href="index.html" title="Kembali ke Scene 1" position="0 1.5 4" class="clickable"></a-link>

  </a-scene>
</body>
</html>
