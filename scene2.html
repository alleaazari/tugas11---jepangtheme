<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scene 2 – Panorama Kuil Jepang</title>
  <script src="js/aframe.min.js"></script>
  <script src="js/components.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <img id="panorama" src="assets/panorama.jpg" crossorigin="anonymous">
    </a-assets>

    <a-sky src="#panorama"></a-sky>

    <a-camera position="0 1.6 0" wasd-controls="fly: false; acceleration: 30">
      <a-cursor fuse="true" fuse-timeout="1500" color="#E83929" raycaster="objects: .clickable"></a-cursor>
    </a-camera>

    <a-entity id="hotspotA" position="-4 1.5 -5">
      <a-sphere radius="0.3" color="#E83929" class="clickable"></a-sphere>
      <a-text value="Gerbang Torii" position="0 0.6 0" align="center" color="#FFFFFF" look-at-camera></a-text>
      <a-plane id="panelA" position="0 1.5 0" width="2.2" height="0.9" color="#1A0A00" opacity="0.88" visible="false" look-at-camera>
        <a-text value="Gerbang suci kuil Shinto,\nmelambangkan batas\ndunia manusia dan dewa." position="0 0 0.01" align="center" color="#F5CBA7" width="2"></a-text>
      </a-plane>
    </a-entity>

    <a-entity id="hotspotB" position="4 1.5 -5">
      <a-sphere radius="0.3" color="#E83929" class="clickable"></a-sphere>
      <a-text value="Kolam Koi" position="0 0.6 0" align="center" color="#FFFFFF" look-at-camera></a-text>
      <a-plane id="panelB" position="0 1.5 0" width="2.2" height="0.9" color="#1A0A00" opacity="0.88" visible="false" look-at-camera>
        <a-text value="Melambangkan kemakmuran.\nIkan koi dianggap suci\ndi Jepang." position="0 0 0.01" align="center" color="#F5CBA7" width="2"></a-text>
      </a-plane>
    </a-entity>

    <a-entity id="hotspotC" position="6 1.5 0">
      <a-sphere radius="0.3" color="#E83929" class="clickable"></a-sphere>
      <a-text value="Pagoda" position="0 0.6 0" align="center" color="#FFFFFF" look-at-camera></a-text>
      <a-plane id="panelC" position="0 1.5 0" width="2.2" height="0.9" color="#1A0A00" opacity="0.88" visible="false" look-at-camera>
        <a-text value="Menara bertingkat tempat\npenyimpanan relik suci." position="0 0 0.01" align="center" color="#F5CBA7" width="2"></a-text>
      </a-plane>
    </a-entity>

    <a-entity id="hotspotD" position="-3 1.5 4">
      <a-sphere radius="0.3" color="#2E7D32" class="clickable"></a-sphere>
      <a-text value="Taman Zen" position="0 0.6 0" align="center" color="#FFFFFF" look-at-camera></a-text>
      <a-plane id="panelD" position="0 1.5 0" width="2.4" height="1.1" color="#0D2B0D" opacity="0.88" visible="false" look-at-camera>
        <a-text value="Taman batu kering (Karesansui).\nBatu dan pasir melambangkan\nair dan gunung untuk meditasi." position="0 0 0.01" align="center" color="#A5D6A7" width="2.1"></a-text>
      </a-plane>
    </a-entity>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        ['A','B','C','D'].forEach(function(id) {
          var sphere = document.querySelector('#hotspot' + id + ' a-sphere');
          var panel  = document.getElementById('panel' + id);
          sphere.addEventListener('click', function() {
            var nowVisible = panel.getAttribute('visible') === 'true' || panel.getAttribute('visible') === true;
            ['A','B','C','D'].forEach(function(x) {
              document.getElementById('panel' + x).setAttribute('visible', false);
            });
            panel.setAttribute('visible', !nowVisible);
          });
        });
      });
    </script>

    <a-link href="index.html" title="Kembali Scene 1" position="-2 1.5 5" class="clickable"></a-link>
    <a-link href="scene3-model.html" title="Scene 3 Model" position="2 1.5 5" class="clickable"></a-link>
  </a-scene>
</body>
</html>
